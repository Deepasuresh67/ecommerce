<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEE STORE</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #2a2a2a;
    --accent: #e8ff00;
    --text: #f0f0f0;
    --muted: #666;
    --success: #00e676;
    --danger: #ff1744;
    --card-bg: #141414;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; overflow-x: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E"); pointer-events: none; z-index: 1000; opacity: 0.4; }

  /* ── AUTH SCREENS ── */
  #auth-screen {
    position: fixed; inset: 0; z-index: 999;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg);
  }
  .auth-box {
    background: var(--card-bg);
    border: 1px solid var(--border);
    width: 100%; max-width: 380px;
    position: relative; overflow: hidden;
  }
  .auth-box::before {
    content: ''; position: absolute; top: 0; left: 0;
    width: 100%; height: 3px; background: var(--accent);
  }
  .auth-tabs {
    display: flex; border-bottom: 1px solid var(--border);
  }
  .auth-tab {
    flex: 1; background: none; border: none; color: var(--muted);
    font-family: 'Syne', sans-serif; font-weight: 700;
    font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.12em;
    padding: 1rem; cursor: pointer; transition: all 0.2s;
    border-bottom: 2px solid transparent; margin-bottom: -1px;
  }
  .auth-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .auth-tab:hover:not(.active) { color: var(--text); }

  .auth-body { padding: 2rem; }
  .auth-logo {
    font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: 1.75rem; letter-spacing: -0.03em;
    color: var(--accent); text-transform: uppercase;
    margin-bottom: 0.2rem;
  }
  .auth-logo span { color: var(--text); }
  .auth-tagline {
    font-size: 0.62rem; text-transform: uppercase;
    letter-spacing: 0.15em; color: var(--muted); margin-bottom: 1.75rem;
  }

  .auth-panel { display: none; }
  .auth-panel.active { display: block; }

  .auth-label {
    font-size: 0.62rem; text-transform: uppercase;
    letter-spacing: 0.12em; color: var(--muted); display: block; margin-bottom: 0.4rem;
  }
  .auth-input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.85rem;
    padding: 0.75rem 1rem; outline: none; transition: border-color 0.2s;
    margin-bottom: 1rem;
  }
  .auth-input:focus { border-color: var(--accent); }
  .auth-input.shake { animation: shake 0.35s ease; border-color: var(--danger); }
  .auth-input.ok { border-color: var(--success); }

  .pw-wrapper { position: relative; margin-bottom: 1rem; }
  .pw-wrapper .auth-input { margin-bottom: 0; padding-right: 2.5rem; }
  .pw-toggle {
    position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em;
    transition: color 0.2s; padding: 0;
  }
  .pw-toggle:hover { color: var(--accent); }

  .pw-strength {
    height: 3px; background: var(--border); margin-bottom: 1rem; border-radius: 2px; overflow: hidden;
  }
  .pw-strength-bar { height: 100%; width: 0; transition: width 0.3s, background 0.3s; }

  .auth-btn {
    width: 100%; background: var(--accent); color: #000;
    border: none; font-family: 'Syne', sans-serif; font-weight: 700;
    font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.1em;
    padding: 0.85rem; cursor: pointer; transition: all 0.2s; margin-top: 0.25rem;
  }
  .auth-btn:hover { background: #fff; }
  .auth-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

  .auth-error {
    font-size: 0.68rem; color: var(--danger);
    text-transform: uppercase; letter-spacing: 0.08em;
    margin-top: 0.75rem; min-height: 1rem;
  }
  .auth-success {
    font-size: 0.68rem; color: var(--success);
    text-transform: uppercase; letter-spacing: 0.08em;
    margin-top: 0.75rem; min-height: 1rem;
  }

  .auth-hint {
    font-size: 0.6rem; color: var(--muted); margin-top: 1.25rem; line-height: 1.7;
    border-top: 1px solid var(--border); padding-top: 1rem;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%      { transform: translateX(-6px); }
    60%      { transform: translateX(6px); }
  }

  /* ── APP ── */
  #app { display: none; }
  header { position: sticky; top: 0; z-index: 100; background: rgba(10,10,10,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 2rem; height: 64px; display: flex; align-items: center; justify-content: space-between; }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.5rem; letter-spacing: -0.03em; color: var(--accent); text-transform: uppercase; }
  .logo span { color: var(--text); }
  .header-right { display: flex; align-items: center; gap: 0.5rem; }
  nav { display: flex; gap: 0.25rem; }
  .nav-btn { background: none; border: 1px solid transparent; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; padding: 0.5rem 1rem; cursor: pointer; border-radius: 4px; transition: all 0.2s; }
  .nav-btn:hover { color: var(--text); border-color: var(--border); }
  .nav-btn.active { color: var(--accent); border-color: var(--accent); background: rgba(232,255,0,0.05); }
  .cart-count { display: inline-flex; align-items: center; justify-content: center; background: var(--accent); color: #000; font-size: 0.6rem; font-weight: 700; width: 16px; height: 16px; border-radius: 50%; margin-left: 4px; vertical-align: middle; }
  .user-badge { display: flex; align-items: center; gap: 0.6rem; border-left: 1px solid var(--border); padding-left: 1rem; margin-left: 0.5rem; }
  .user-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--accent); color: #000; display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 0.75rem; text-transform: uppercase; flex-shrink: 0; }
  .user-name { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text); max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .logout-btn { background: none; border: 1px solid var(--border); color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em; padding: 0.3rem 0.65rem; cursor: pointer; border-radius: 3px; transition: all 0.2s; }
  .logout-btn:hover { border-color: var(--danger); color: var(--danger); }

  main { max-width: 1400px; margin: 0 auto; padding: 2rem; }
  .page { display: none; animation: fadeIn 0.3s ease; }
  .page.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .page-header { display: flex; align-items: baseline; gap: 1rem; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
  .page-title { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; text-transform: uppercase; letter-spacing: -0.03em; }
  .page-title .accent { color: var(--accent); }
  .page-subtitle { color: var(--muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; }
  .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1px; background: var(--border); border: 1px solid var(--border); }
  .product-card { background: var(--card-bg); padding: 1.5rem; transition: background 0.2s; position: relative; overflow: hidden; }
  .product-card::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 0; background: var(--accent); transition: height 0.3s; }
  .product-card:hover { background: var(--surface2); }
  .product-card:hover::before { height: 100%; }
  .product-id { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 0.5rem; }
  .product-name { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; margin-bottom: 0.75rem; }
  .product-price { font-size: 1.25rem; font-weight: 500; color: var(--accent); margin-bottom: 1.25rem; }
  .product-price .currency { font-size: 0.75rem; color: var(--muted); }
  .add-to-cart-btn { width: 100%; background: transparent; border: 1px solid var(--border); color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; padding: 0.6rem; cursor: pointer; transition: all 0.2s; }
  .add-to-cart-btn:hover { background: var(--accent); color: #000; border-color: var(--accent); }
  .loading { display: flex; align-items: center; gap: 0.75rem; color: var(--muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; padding: 3rem 0; }
  .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .cart-layout { display: grid; grid-template-columns: 1fr 320px; gap: 1.5rem; align-items: start; }
  .cart-items-list { display: flex; flex-direction: column; gap: 1px; background: var(--border); border: 1px solid var(--border); }
  .cart-item { background: var(--card-bg); display: flex; align-items: center; justify-content: space-between; padding: 20px; border-bottom: 1px solid #333; gap: 1rem; }
  .cart-item-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; flex: 1; }
  .cart-item-qty { display: flex; align-items: center; gap: 10px; background: var(--surface2); border: 1px solid var(--border); padding: 0.25rem 0.5rem; }
  .cart-item-qty span { font-size: 0.85rem; min-width: 20px; text-align: center; }
  .qty-btn { background: #111; color: white; border: 1px solid #444; padding: 5px 10px; cursor: pointer; font-family: 'DM Mono', monospace; transition: color 0.2s; }
  .qty-btn:hover { color: var(--accent); }
  .cart-item-price { color: #d4ff00; font-weight: bold; font-size: 0.9rem; min-width: 80px; text-align: right; }
  .remove-btn { background: none; border: none; color: #888; cursor: pointer; font-size: 1rem; transition: color 0.2s; padding: 0.25rem; }
  .remove-btn:hover { color: var(--danger); }
  .cart-summary { background: var(--card-bg); border: 1px solid var(--border); padding: 1.5rem; position: sticky; top: 80px; }
  .summary-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 1.25rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border); }
  .summary-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; font-size: 0.8rem; }
  .summary-row.total { margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.1rem; }
  .summary-row.total span:last-child { color: var(--accent); }
  .summary-label { color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; font-size: 0.7rem; }
  .checkout-btn { width: 100%; background: var(--accent); color: #000; border: none; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.1em; padding: 0.9rem; cursor: pointer; margin-top: 1.25rem; transition: all 0.2s; }
  .checkout-btn:hover { background: #fff; transform: translateY(-1px); }
  .checkout-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; transform: none; }
  .orders-list { display: flex; flex-direction: column; gap: 1px; background: var(--border); border: 1px solid var(--border); }
  .order-card { background: var(--card-bg); padding: 1.5rem; animation: fadeIn 0.3s ease; }
  .order-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .order-id-text { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--muted); flex: 1; word-break: break-all; }
  .order-total { font-family: 'Syne', sans-serif; font-weight: 700; color: var(--accent); font-size: 1rem; }
  .order-badge { background: rgba(0,230,118,0.1); color: var(--success); border: 1px solid rgba(0,230,118,0.3); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; padding: 0.2rem 0.6rem; border-radius: 2px; }
  .order-items-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; }
  .order-item-tag { background: var(--surface2); border: 1px solid var(--border); font-size: 0.7rem; padding: 0.25rem 0.6rem; color: var(--muted); }
  .empty-state { text-align: center; padding: 4rem 2rem; color: var(--muted); }
  .empty-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }
  .empty-text { font-family: 'Syne', sans-serif; font-size: 1.25rem; font-weight: 700; margin-bottom: 0.5rem; color: var(--text); }
  .empty-sub { font-size: 0.75rem; }
  #toast-container { position: fixed; bottom: 2rem; right: 2rem; z-index: 9999; display: flex; flex-direction: column; gap: 0.5rem; }
  .toast { background: var(--surface2); border: 1px solid var(--border); border-left: 3px solid var(--accent); padding: 0.75rem 1.25rem; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; animation: toastIn 0.3s ease; max-width: 320px; word-break: break-word; }
  .toast.error { border-left-color: var(--danger); }
  .toast.success { border-left-color: var(--success); }
  @keyframes toastIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); }
  @media (max-width: 768px) {
    .cart-layout { grid-template-columns: 1fr; }
    .products-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
    main { padding: 1rem; }
    header { padding: 0 1rem; }
    .cart-item { flex-wrap: wrap; }
    .user-name { display: none; }
    .auth-body { padding: 1.5rem; }
  }
</style>
</head>
<body>

<!-- ── AUTH SCREEN ── -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab" id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
    </div>
    <div class="auth-body">
      <div class="auth-logo">Dee<span>Store</span></div>
      <div class="auth-tagline">// Premium goods, secured access</div>

      <!-- LOGIN PANEL -->
      <div class="auth-panel active" id="panel-login">
        <label class="auth-label" for="login-user">Username</label>
        <input class="auth-input" type="text" id="login-user" placeholder="your_username" autocomplete="username"
          onkeydown="if(event.key==='Enter')document.getElementById('login-pass').focus()">

        <label class="auth-label" for="login-pass">Password</label>
        <div class="pw-wrapper">
          <input class="auth-input" type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"
            onkeydown="if(event.key==='Enter')handleLogin()">
          <button class="pw-toggle" type="button" onclick="togglePw('login-pass', this)">show</button>
        </div>

        <button class="auth-btn" onclick="handleLogin()" id="login-btn">Sign In →</button>
        <div class="auth-error" id="login-error"></div>
        <div class="auth-hint">Don't have an account? <span style="color:var(--accent);cursor:pointer;" onclick="switchTab('signup')">Sign Up →</span></div>
      </div>

      <!-- SIGNUP PANEL -->
      <div class="auth-panel" id="panel-signup">
        <label class="auth-label" for="signup-user">Choose Username</label>
        <input class="auth-input" type="text" id="signup-user" placeholder="e.g. john_doe" autocomplete="username"
          oninput="checkUsernameInput(this)"
          onkeydown="if(event.key==='Enter')document.getElementById('signup-pass').focus()">

        <label class="auth-label" for="signup-pass">Password</label>
        <div class="pw-wrapper">
          <input class="auth-input" type="password" id="signup-pass" placeholder="Min 6 characters" autocomplete="new-password"
            oninput="checkPasswordStrength(this.value)"
            onkeydown="if(event.key==='Enter')document.getElementById('signup-confirm').focus()">
          <button class="pw-toggle" type="button" onclick="togglePw('signup-pass', this)">show</button>
        </div>
        <div class="pw-strength"><div class="pw-strength-bar" id="pw-bar"></div></div>

        <label class="auth-label" for="signup-confirm">Confirm Password</label>
        <div class="pw-wrapper">
          <input class="auth-input" type="password" id="signup-confirm" placeholder="Repeat password" autocomplete="new-password"
            onkeydown="if(event.key==='Enter')handleSignup()">
          <button class="pw-toggle" type="button" onclick="togglePw('signup-confirm', this)">show</button>
        </div>

        <button class="auth-btn" onclick="handleSignup()" id="signup-btn">Create Account →</button>
        <div class="auth-error" id="signup-error"></div>
        <div class="auth-success" id="signup-success"></div>
        <div class="auth-hint">Already have an account? <span style="color:var(--accent);cursor:pointer;" onclick="switchTab('login')">Sign In →</span></div>
      </div>
    </div>
  </div>
</div>

<!-- ── APP ── -->
<div id="app">
  <header>
    <div class="logo">Dee<span>Store</span></div>
    <div class="header-right">
      <nav>
        <button class="nav-btn active" id="nav-products" onclick="showPage('products', this)">Products</button>
        <button class="nav-btn" id="nav-cart" onclick="showPage('cart', this)">Cart <span class="cart-count" id="cart-count">0</span></button>
        <button class="nav-btn" id="nav-orders" onclick="showPage('orders', this)">Orders</button>
      </nav>
      <div class="user-badge">
        <div class="user-avatar" id="user-avatar">?</div>
        <span class="user-name" id="user-name-display">—</span>
        <button class="logout-btn" onclick="handleLogout()">Logout</button>
      </div>
    </div>
  </header>

  <main>
    <!-- PRODUCTS -->
    <div class="page active" id="page-products">
      <div class="page-header">
        <h1 class="page-title">All <span class="accent">Products</span></h1>
        <span class="page-subtitle" id="product-count">— Loading</span>
      </div>
      <div id="products-container">
        <div class="loading"><div class="spinner"></div> Fetching products...</div>
      </div>
    </div>

    <!-- CART -->
    <div class="page" id="page-cart">
      <div class="page-header">
        <h1 class="page-title">Your <span class="accent">Cart</span></h1>
      </div>
      <div class="cart-layout">
        <div id="cart-items-container"></div>
        <div class="cart-summary">
          <div class="summary-title">Order Summary</div>
          <div class="summary-row"><span class="summary-label">User</span><span id="summary-user" style="color:var(--accent);font-size:0.75rem;">—</span></div>
          <div class="summary-row"><span class="summary-label">Items</span><span id="summary-items">0</span></div>
          <div class="summary-row"><span class="summary-label">Subtotal</span><span id="summary-subtotal">₹0</span></div>
          <div class="summary-row total"><span>Total</span><span id="summary-total">₹0</span></div>
          <button class="checkout-btn" id="checkout-btn" onclick="placeOrder()" disabled>Place Order</button>
        </div>
      </div>
    </div>

    <!-- ORDERS -->
    <div class="page" id="page-orders">
      <div class="page-header">
        <h1 class="page-title">My <span class="accent">Orders</span></h1>
        <span class="page-subtitle" id="order-count"></span>
      </div>
      <div id="orders-container">
        <div class="loading"><div class="spinner"></div> Fetching orders...</div>
      </div>
    </div>
  </main>
</div>

<div id="toast-container"></div>

<script>
/* ─────────────────────────────────────────────────────────
   CONFIG
───────────────────────────────────────────────────────── */
const API = 'https://8h0awzpfti.execute-api.ap-southeast-1.amazonaws.com/v1';

/* ─────────────────────────────────────────────────────────
   SIMPLE HASH (SHA-256 via Web Crypto)
   Passwords are hashed before storing — never plaintext.
───────────────────────────────────────────────────────── */
async function hashPassword(password) {
  const encoder = new TextEncoder();
  const data = encoder.encode('deestore_salt_2025_' + password);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

/* ─────────────────────────────────────────────────────────
   PERSISTENT STORAGE HELPERS
   Users stored as: users:<username> → { username, passwordHash, createdAt }
   Session stored in sessionStorage (cleared on tab close)
───────────────────────────────────────────────────────── */
async function saveUser(username, passwordHash) {
  const key = 'users:' + username.toLowerCase();
  const val = JSON.stringify({ username, passwordHash, createdAt: Date.now() });
  try {
    await window.storage.set(key, val);
    return true;
  } catch(e) {
    // Fallback to localStorage if storage API unavailable
    try {
      const users = JSON.parse(localStorage.getItem('ds_users') || '{}');
      users[username.toLowerCase()] = { username, passwordHash, createdAt: Date.now() };
      localStorage.setItem('ds_users', JSON.stringify(users));
      return true;
    } catch(e2) { return false; }
  }
}

async function getUser(username) {
  const key = 'users:' + username.toLowerCase();
  try {
    const result = await window.storage.get(key);
    return result ? JSON.parse(result.value) : null;
  } catch(e) {
    // Fallback to localStorage
    try {
      const users = JSON.parse(localStorage.getItem('ds_users') || '{}');
      return users[username.toLowerCase()] || null;
    } catch(e2) { return null; }
  }
}

function saveSession(username) {
  sessionStorage.setItem('ds_session', username);
}

function getSession() {
  return sessionStorage.getItem('ds_session');
}

function clearSession() {
  sessionStorage.removeItem('ds_session');
}

/* ─────────────────────────────────────────────────────────
   UI HELPERS
───────────────────────────────────────────────────────── */
let allProducts = [];
let localCart   = [];

function showToast(msg, type = '') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function switchTab(tab) {
  ['login', 'signup'].forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('active', t === tab);
    document.getElementById('panel-' + t).classList.toggle('active', t === tab);
  });
  document.getElementById('login-error').textContent = '';
  document.getElementById('signup-error').textContent = '';
  document.getElementById('signup-success').textContent = '';
}

function togglePw(inputId, btn) {
  const input = document.getElementById(inputId);
  if (input.type === 'password') {
    input.type = 'text';
    btn.textContent = 'hide';
  } else {
    input.type = 'password';
    btn.textContent = 'show';
  }
}

function shakeInput(id) {
  const el = document.getElementById(id);
  el.classList.remove('shake');
  void el.offsetWidth; // reflow
  el.classList.add('shake');
  setTimeout(() => el.classList.remove('shake'), 400);
  el.focus();
}

function checkUsernameInput(el) {
  const val = el.value.trim();
  el.classList.remove('ok', 'shake');
  if (val.length >= 3 && /^[a-zA-Z0-9_\-]+$/.test(val)) {
    el.classList.add('ok');
  }
}

function checkPasswordStrength(pw) {
  const bar = document.getElementById('pw-bar');
  let score = 0;
  if (pw.length >= 6) score++;
  if (pw.length >= 10) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^a-zA-Z0-9]/.test(pw)) score++;
  const pct = (score / 5) * 100;
  const colors = ['', '#ff1744', '#ff6d00', '#ffd600', '#00e676', '#00e676'];
  bar.style.width  = pct + '%';
  bar.style.background = colors[score] || '#333';
}

/* ─────────────────────────────────────────────────────────
   AUTH LOGIC
───────────────────────────────────────────────────────── */
async function handleSignup() {
  const username  = document.getElementById('signup-user').value.trim();
  const password  = document.getElementById('signup-pass').value;
  const confirm   = document.getElementById('signup-confirm').value;
  const errEl     = document.getElementById('signup-error');
  const successEl = document.getElementById('signup-success');
  const btn       = document.getElementById('signup-btn');

  errEl.textContent     = '';
  successEl.textContent = '';

  // Validate username
  if (!username || username.length < 3) {
    errEl.textContent = '⚠ Username must be at least 3 characters';
    shakeInput('signup-user'); return;
  }
  if (!/^[a-zA-Z0-9_\-]+$/.test(username)) {
    errEl.textContent = '⚠ Only letters, numbers, _ and - allowed';
    shakeInput('signup-user'); return;
  }

  // Validate password
  if (!password || password.length < 6) {
    errEl.textContent = '⚠ Password must be at least 6 characters';
    shakeInput('signup-pass'); return;
  }
  if (password !== confirm) {
    errEl.textContent = '⚠ Passwords do not match';
    shakeInput('signup-confirm'); return;
  }

  btn.disabled = true;
  btn.textContent = 'Creating...';

  // Check if username taken
  const existing = await getUser(username);
  if (existing) {
    errEl.textContent = '⚠ Username already taken — choose another';
    shakeInput('signup-user');
    btn.disabled = false;
    btn.textContent = 'Create Account →';
    return;
  }

  const hash = await hashPassword(password);
  const saved = await saveUser(username, hash);

  if (!saved) {
    errEl.textContent = '⚠ Could not create account — storage error';
    btn.disabled = false;
    btn.textContent = 'Create Account →';
    return;
  }

  successEl.textContent = '✓ Account created! Signing you in...';
  btn.textContent = 'Create Account →';
  btn.disabled = false;

  setTimeout(() => {
    saveSession(username);
    startApp(username);
  }, 900);
}

async function handleLogin() {
  const username = document.getElementById('login-user').value.trim();
  const password = document.getElementById('login-pass').value;
  const errEl    = document.getElementById('login-error');
  const btn      = document.getElementById('login-btn');

  errEl.textContent = '';

  if (!username) {
    errEl.textContent = '⚠ Enter your username';
    shakeInput('login-user'); return;
  }
  if (!password) {
    errEl.textContent = '⚠ Enter your password';
    shakeInput('login-pass'); return;
  }

  btn.disabled = true;
  btn.textContent = 'Checking...';

  const user = await getUser(username);

  if (!user) {
    errEl.textContent = '⚠ No account found — please sign up first';
    shakeInput('login-user');
    btn.disabled = false;
    btn.textContent = 'Sign In →';
    return;
  }

  const hash = await hashPassword(password);

  if (hash !== user.passwordHash) {
    errEl.textContent = '⚠ Incorrect password';
    shakeInput('login-pass');
    btn.disabled = false;
    btn.textContent = 'Sign In →';
    return;
  }

  btn.disabled = false;
  btn.textContent = 'Sign In →';

  saveSession(user.username);
  startApp(user.username);
}

function handleLogout() {
  clearSession();
  allProducts = [];
  localCart   = [];
  document.getElementById('cart-count').textContent = '0';
  document.getElementById('app').style.display = 'none';
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
  document.getElementById('login-error').textContent = '';
  switchTab('login');
  showToast('Signed out', '');
}

function startApp(username) {
  document.getElementById('user-avatar').textContent       = username.charAt(0).toUpperCase();
  document.getElementById('user-name-display').textContent = username;
  document.getElementById('summary-user').textContent      = username;
  document.getElementById('auth-screen').style.display     = 'none';
  document.getElementById('app').style.display             = 'block';
  showPage('products', document.getElementById('nav-products'));
}

/* ─────────────────────────────────────────────────────────
   NAV
───────────────────────────────────────────────────────── */
function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  if (btn) btn.classList.add('active');
  if (name === 'products') loadProducts();
  if (name === 'cart')     loadCart();
  if (name === 'orders')   loadOrders();
}

/* ─────────────────────────────────────────────────────────
   PRODUCTS
───────────────────────────────────────────────────────── */
async function loadProducts() {
  const container = document.getElementById('products-container');
  if (allProducts.length) { renderProducts(); return; }
  container.innerHTML = '<div class="loading"><div class="spinner"></div> Fetching products...</div>';
  try {
    const res = await fetch(API + '/products');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const raw = await res.text();
    let data;
    try { data = JSON.parse(raw); } catch(e) { throw new Error('Invalid JSON'); }

    if (Array.isArray(data)) allProducts = data;
    else if (data.body) {
      const parsed = typeof data.body === 'string' ? JSON.parse(data.body) : data.body;
      allProducts = Array.isArray(parsed) ? parsed : parsed.Items || [];
    } else if (data.Items) allProducts = data.Items;
    else {
      const arrVal = Object.values(data).find(v => Array.isArray(v));
      allProducts = arrVal || [];
    }

    if (!allProducts.length) {
      container.innerHTML = `<div class="empty-state"><div class="empty-icon">📦</div><div class="empty-text">No Products Found</div></div>`;
      return;
    }
    renderProducts();
  } catch(e) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🔌</div>
        <div class="empty-text">Network Error</div>
        <div class="empty-sub" style="margin-top:0.5rem;font-size:0.7rem;">${e.message}</div>
        <button onclick="loadProducts()" style="margin-top:1.5rem;background:none;border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.1em;padding:0.6rem 1.25rem;cursor:pointer;">↺ Retry</button>
      </div>`;
  }
}

function renderProducts() {
  document.getElementById('product-count').textContent = `— ${allProducts.length} items`;
  document.getElementById('products-container').innerHTML =
    '<div class="products-grid">' +
    allProducts.map(p => `
      <div class="product-card">
        <div class="product-id">SKU #${String(p.product_id).padStart(3, '0')}</div>
        <div class="product-name">${p.name}</div>
        <div class="product-price"><span class="currency">₹ </span>${Number(p.price).toLocaleString('en-IN')}</div>
        <button class="add-to-cart-btn" onclick="addToCart(${p.product_id})">+ Add to Cart</button>
      </div>`).join('') + '</div>';
}

/* ─────────────────────────────────────────────────────────
   CART  — uses logged-in username as user_id
───────────────────────────────────────────────────────── */
function getCurrentUser() {
  return getSession();
}

async function addToCart(product_id) {
  const userId = getCurrentUser();
  try {
    await fetch(API + '/cart', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: userId, product_id, quantity: 1 })
    });
    showToast('Added to cart', 'success');
    loadCart();
  } catch(e) {
    showToast('Failed to add item', 'error');
  }
}

async function loadCart() {
  const userId = getCurrentUser();
  try {
    const res  = await fetch(API + `/cart?user_id=${userId}`);
    const data = await res.json();
    const items = Array.isArray(data) ? data : data.Items || [];
    localCart = items.map(c => {
      const product = allProducts.find(p => p.product_id == c.product_id);
      return { ...c, name: product ? product.name : 'Unknown', price: product ? Number(product.price) : 0 };
    });
    renderCart();
    updateCartCount();
  } catch(e) {
    console.error('Cart load error:', e);
  }
}

function updateCartCount() {
  document.getElementById('cart-count').textContent = localCart.reduce((s, i) => s + i.quantity, 0);
}

function renderCart() {
  const container = document.getElementById('cart-items-container');
  if (!localCart.length) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🛒</div>
        <div class="empty-text">Cart is Empty</div>
        <div class="empty-sub">Add products to get started</div>
      </div>`;
    document.getElementById('checkout-btn').disabled = true;
    document.getElementById('summary-items').textContent    = '0';
    document.getElementById('summary-subtotal').textContent = '₹0';
    document.getElementById('summary-total').textContent    = '₹0';
    return;
  }
  let total = 0, totalItems = 0;
  container.innerHTML = localCart.map(item => {
    const itemTotal = item.price * item.quantity;
    total += itemTotal; totalItems += item.quantity;
    return `
      <div class="cart-item">
        <input type="checkbox" class="select-item" data-id="${item.product_id}" checked>
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-qty">
          <button class="qty-btn" onclick="changeQty(${item.product_id}, -1)">−</button>
          <span>${item.quantity}</span>
          <button class="qty-btn" onclick="changeQty(${item.product_id}, 1)">+</button>
        </div>
        <div class="cart-item-price">₹${itemTotal.toLocaleString('en-IN')}</div>
        <button class="remove-btn" onclick="removeItem(${item.product_id})">×</button>
      </div>`;
  }).join('');
  document.getElementById('summary-items').textContent    = totalItems;
  document.getElementById('summary-subtotal').textContent = '₹' + total.toLocaleString('en-IN');
  document.getElementById('summary-total').textContent    = '₹' + total.toLocaleString('en-IN');
  document.getElementById('checkout-btn').disabled = total === 0;
}

async function changeQty(product_id, delta) {
  const userId = getCurrentUser();
  const item   = localCart.find(i => i.product_id == product_id);
  if (!item) return;
  if (delta === -1 && item.quantity <= 1) { await removeItem(product_id); return; }
  await fetch(API + '/cart', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ user_id: userId, product_id, quantity: delta })
  });
  loadCart();
}

async function removeItem(product_id) {
  const userId = getCurrentUser();
  await fetch(API + '/cart', {
    method: 'DELETE',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ user_id: userId, product_id })
  });
  showToast('Item removed', '');
  loadCart();
}

/* ─────────────────────────────────────────────────────────
   ORDERS
───────────────────────────────────────────────────────── */
async function loadOrders() {
  const container = document.getElementById('orders-container');
  container.innerHTML = '<div class="loading"><div class="spinner"></div> Fetching orders...</div>';
  try {
    const userId = getCurrentUser();
    const res    = await fetch(API + `/orders?user_id=${userId}`);
    const data   = await res.json();
    renderOrders(Array.isArray(data) ? data : data.Items || []);
  } catch(e) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">❌</div><div class="empty-text">Failed to load orders</div></div>';
  }
}

function renderOrders(orders) {
  const container = document.getElementById('orders-container');
  if (!orders.length) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <div class="empty-text">No Orders Yet</div>
        <div class="empty-sub">Place your first order from the cart</div>
      </div>`;
    return;
  }
  document.getElementById('order-count').textContent = `— ${orders.length} orders`;
  container.innerHTML =
    '<div class="orders-list">' +
    orders.map(o => `
      <div class="order-card">
        <div class="order-header">
          <div class="order-id-text">Order ID: ${o.order_id}</div>
          <div class="order-badge">CONFIRMED</div>
          <div class="order-total">₹${Number(o.total).toLocaleString('en-IN')}</div>
        </div>
        <div class="order-items-tags">
          ${o.items.map(i => `<div class="order-item-tag">${i.name} × ${i.quantity}</div>`).join('')}
        </div>
        <div class="order-id-text">User: ${o.user_id}</div>
      </div>`).join('') +
    '</div>';
}

/* ─────────────────────────────────────────────────────────
   PLACE ORDER
───────────────────────────────────────────────────────── */
async function placeOrder() {
  const userId = getCurrentUser();
  const selectedItems = localCart.filter(item => {
    const cb = document.querySelector(`input[data-id='${item.product_id}']`);
    return cb && cb.checked;
  });
  if (!selectedItems.length) { showToast('Select items to order', 'error'); return; }

  const orderData = {
    user_id: userId,
    items:   selectedItems,
    total:   selectedItems.reduce((sum, i) => sum + (i.price * i.quantity), 0)
  };

  try {
    await fetch(API + '/orders', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(orderData)
    });
    for (let item of selectedItems) {
      await fetch(API + '/cart', {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id: userId, product_id: item.product_id })
      });
    }
    showToast('Order placed!', 'success');
    loadCart();
    showPage('orders', document.getElementById('nav-orders'));
  } catch(err) {
    showToast('Order failed', 'error');
  }
}

/* ─────────────────────────────────────────────────────────
   INIT — check for existing session
───────────────────────────────────────────────────────── */
(function init() {
  const session = getSession();
  if (session) {
    startApp(session);
  }
})();
</script>
